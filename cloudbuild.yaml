steps:
  # 1. Build the container image using the multi-stage Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Image'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/coachagent-repo/coachagent-service:$BUILD_ID',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/coachagent-repo/coachagent-service:latest',
      '.'
    ]

  # 2. Push the image to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Image'
    args: [
      'push',
      '--all-tags',
      'us-central1-docker.pkg.dev/$PROJECT_ID/coachagent-repo/coachagent-service'
    ]

  # 3. Deploy the container to Google Cloud Run
  # Connects configurations via environment variables and loads credentials securely from Secret Manager
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'coachagent-service',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/coachagent-repo/coachagent-service:$BUILD_ID',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--add-cloudsql-instances', '$PROJECT_ID:us-central1:coachagent-postgres',
      '--set-env-vars', 'ENVIRONMENT=production,GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=us-central1',
      # Link secrets from GCP Secret Manager directly into Cloud Run container environment variables
      '--set-secrets', 'DATABASE_URL=COACHAGENT_DATABASE_URL:latest,ENCRYPTION_KEY=COACHAGENT_ENCRYPTION_KEY:latest,REDIS_URL=COACHAGENT_REDIS_URL:latest,WHATSAPP_TOKEN=COACHAGENT_WHATSAPP_TOKEN:latest,WHATSAPP_PHONE_NUMBER_ID=COACHAGENT_WHATSAPP_PHONE_NUMBER_ID:latest,WHATSAPP_VERIFY_TOKEN=COACHAGENT_WHATSAPP_VERIFY_TOKEN:latest,GCS_BUCKET_NAME=COACHAGENT_GCS_BUCKET_NAME:latest,GOOGLE_CLIENT_ID=COACHAGENT_GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=COACHAGENT_GOOGLE_CLIENT_SECRET:latest'
    ]

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/coachagent-repo/coachagent-service:$BUILD_ID'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/coachagent-repo/coachagent-service:latest'

options:
  logging: CLOUD_LOGGING_ONLY
